kind = "web"
previewPath = "/"
title = "Kallas Ventures"
version = "1.0.0"
id = "artifacts/kallas-ventures"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23471

[services.development]
run = "pnpm --filter @workspace/kallas-ventures run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kallas-ventures", "run", "build" ]
publicDir = "artifacts/kallas-ventures/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23471"
BASE_PATH = "/"
